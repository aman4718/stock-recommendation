<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Groww FAQ Assistant</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --green:#00d09c;--green-dk:#00b386;
      --bg:#f4f6f9;--card:#fff;--border:#e2e8f0;
      --t1:#1a202c;--t2:#4a5568;--t3:#a0aec0;
      --user-bg:#e6fdf7;--refused:#fff7ed;--refused-b:#f97316;
    }
    html,body{height:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:var(--bg);color:var(--t1);display:flex;flex-direction:column;
      height:100dvh;min-height:-webkit-fill-available;overflow:hidden}

    /* ── Header ── */
    header{background:#fff;border-bottom:1px solid var(--border);padding:14px 20px;
      display:flex;align-items:center;gap:12px;flex-shrink:0}
    .logo{width:32px;height:32px;background:var(--green);border-radius:8px;
      display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px}
    .header-text h1{font-size:16px;font-weight:700;color:var(--t1)}
    .header-text p{font-size:12px;color:var(--t3)}

    /* ── Messages ── */
    #msgs{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px}

    /* ── Welcome card ── */
    .welcome{background:var(--card);border:1px solid var(--border);border-radius:16px;
      padding:24px;text-align:center;max-width:560px;margin:auto;width:100%}
    .welcome h2{font-size:20px;font-weight:700;color:var(--t1);margin-bottom:8px}
    .welcome p{font-size:14px;color:var(--t2);margin-bottom:20px;line-height:1.6}
    .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px}
    .chip{background:var(--bg);border:1px solid var(--border);border-radius:20px;
      padding:7px 14px;font-size:13px;color:var(--t2);cursor:pointer;transition:all .15s}
    .chip:hover{background:var(--green);color:#fff;border-color:var(--green)}
    .disclaimer{font-size:11px;color:var(--t3);padding:8px 12px;background:#f8fafc;
      border-radius:8px;border:1px solid var(--border)}

    /* ── Bubbles ── */
    .msg{display:flex;gap:10px;max-width:720px;width:100%;align-self:center}
    .msg.user{justify-content:flex-end}
    .bubble{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.7;max-width:80%}
    .msg.user .bubble{background:var(--green);color:#fff;border-radius:16px 16px 4px 16px}
    .msg.ai   .bubble{background:var(--card);border:1px solid var(--border);
      border-radius:4px 16px 16px 16px;color:var(--t1)}
    .msg.refused .bubble{background:var(--refused);border-color:var(--refused-b);color:#9a3412}

    .avatar{width:30px;height:30px;border-radius:50%;background:var(--green);flex-shrink:0;
      display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;margin-top:2px}

    /* ── Sources ── */
    .sources{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
    .sources-label{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;
      letter-spacing:.05em;margin-bottom:5px}
    .src-link{display:block;font-size:12px;color:var(--green);text-decoration:none;
      word-break:break-all;margin-top:3px}
    .src-link:hover{text-decoration:underline}

    /* ── Typing dots ── */
    .typing{display:flex;gap:4px;padding:14px 16px}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--green);
      animation:dot 1s ease-in-out infinite}
    .dot:nth-child(2){animation-delay:.2s}
    .dot:nth-child(3){animation-delay:.4s}
    @keyframes dot{0%,100%{transform:scale(.7);opacity:.4}50%{transform:scale(1.1);opacity:1}}

    /* ── Input bar ── */
    #bar{background:#fff;border-top:1px solid var(--border);padding:12px 16px;flex-shrink:0;
      padding-bottom:max(12px, env(safe-area-inset-bottom))}
    #form{display:flex;gap:8px;max-width:720px;margin:0 auto}
    #q{flex:1;border:1px solid var(--border);border-radius:24px;padding:10px 18px;
      font-size:16px;outline:none;color:var(--t1);background:var(--bg);resize:none;
      -webkit-appearance:none}
    #q:focus{border-color:var(--green)}
    #btn{width:44px;height:44px;border-radius:50%;background:var(--green);border:none;
      cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
      transition:background .15s;-webkit-tap-highlight-color:transparent}
    #btn:active{background:var(--green-dk)}
    #btn svg{width:18px;height:18px;fill:#fff}

    /* ── Mobile ── */
    @media(max-width:600px){
      header{padding:10px 14px}
      .header-text h1{font-size:15px}
      #msgs{padding:14px 12px;gap:12px}
      .welcome{padding:20px 16px;border-radius:14px}
      .welcome h2{font-size:17px}
      .welcome p{font-size:13px;margin-bottom:16px}
      .chips{gap:7px}
      .chip{font-size:12px;padding:6px 12px}
      .bubble{font-size:13px;padding:10px 13px;max-width:90%}
      .avatar{width:26px;height:26px;font-size:11px}
      .msg{gap:7px}
      #bar{padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom))}
      #q{font-size:16px;padding:9px 15px}
      #btn{width:40px;height:40px}
      .src-link{font-size:11px}
    }
  </style>
</head>
<body>

<header>
  <div class="logo">G</div>
  <div class="header-text">
    <h1>Groww FAQ Assistant</h1>
    <p>Facts-only &bull; No investment advice</p>
  </div>
</header>

<div id="msgs">
  <div class="welcome">
    <h2>Ask anything about Mutual Funds, ETFs &amp; Stocks</h2>
    <p>Get instant, fact-based answers with source citations from Groww.</p>
    <div class="chips">
      <button class="chip" onclick="ask('What is expense ratio in mutual funds?')">Expense ratio</button>
      <button class="chip" onclick="ask('What is the ELSS lock-in period?')">ELSS lock-in</button>
      <button class="chip" onclick="ask('How does SIP work?')">How SIP works</button>
      <button class="chip" onclick="ask('What is exit load?')">Exit load</button>
      <button class="chip" onclick="ask('How to download capital gains statement?')">Capital gains statement</button>
      <button class="chip" onclick="ask('What is riskometer in mutual funds?')">Riskometer</button>
    </div>
    <div class="disclaimer">Facts-only assistant &bull; No personalised investment advice</div>
  </div>
</div>

<div id="bar">
  <form id="form" onsubmit="return false">
    <input id="q" type="text" placeholder="Ask a factual question…" autocomplete="off"/>
    <button id="btn" type="submit">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </form>
</div>

<script>
  const msgs = document.getElementById('msgs');
  const q    = document.getElementById('q');
  const API  = '';   // same origin

  function addMsg(role, html, sources, refused) {
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : refused ? 'refused' : 'ai');

    if (role === 'ai') {
      div.innerHTML = `<div class="avatar">G</div><div></div>`;
      const inner = document.createElement('div');
      inner.className = 'bubble';
      inner.innerHTML = `<div>${escHtml(html)}</div>`;
      if (sources && sources.length) {
        const sl = document.createElement('div');
        sl.className = 'sources';
        sl.innerHTML = `<div class="sources-label">Source</div>` +
          sources.map(s => `<a class="src-link" href="${s}" target="_blank" rel="noopener">${s}</a>`).join('');
        inner.appendChild(sl);
      }
      div.children[1].replaceWith(inner);
    } else {
      div.innerHTML = `<div class="bubble">${escHtml(html)}</div>`;
    }

    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addTyping() {
    const d = document.createElement('div');
    d.className = 'msg ai'; d.id = 'typing';
    d.innerHTML = `<div class="avatar">G</div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
    return d;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  async function ask(text) {
    const query = (text || q.value).trim();
    if (!query) return;
    q.value = '';
    addMsg('user', query);
    const t = addTyping();
    try {
      const r = await fetch(API + '/chat', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({query}),
      });
      const data = await r.json();
      t.remove();
      if (!r.ok) { addMsg('ai', data.detail || 'Error. Please try again.', [], false); return; }
      addMsg('ai', data.answer, data.sources, data.refused);
    } catch(e) {
      t.remove();
      addMsg('ai', 'Connection error. Is the server running?', [], false);
    }
  }

  document.getElementById('form').addEventListener('submit', () => ask());
  q.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ask(); }});
</script>
</body>
</html>
